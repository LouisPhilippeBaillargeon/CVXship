# ============================
# PARAMETERS
# soc_i              : Initial state of charge (MWh)
# soc_f              : Desired final state of charge (MWh)
# timestep           : Duration of one timestep (h). 
# fuel_price         : ($/kg)
# init_speed         : (m/s)
# ============================
[params]
soc_i               = 1.5
soc_f               = 3
timestep            = 1.0
fuel_price          = 1.396
init_speed          = 0

# ============================
# Auxiliary load forecast
# power              : Auxiliary load (MW)
# until              : Optional end datetime. Omit on the last band to use it for the rest of the trip.
# from/start_datetime: Optional explicit start datetime. If omitted, bands are contiguous in file order.
# ============================
[[auxiliary_load]]
power = 0.1
until = "2025-06-01T10:00"

[[auxiliary_load]]
power = 0.11

# ============================
# List of transit cities considered in the problem
#city                : Name
#arrival_datetime    : "YYYY-MM-DDTHH:MM" in the UTC timezone
#departure_datetime  : "YYYY-MM-DDTHH:MM" in the UTC timezone
#lat                 : latitude
#lon                 : longitude
#power_cost          : ($/MWh)
# ============================
[[transit]]
city                = "Sept-Iles"
arrival_datetime    = "2025-06-01T03:00"
departure_datetime  = "2025-06-01T06:00"
lat                 = 50.097070
lon                 = -66.31533
power_cost          = 183
max_charge_power    = 5

[[transit]]
city                = "Gaspe"
arrival_datetime    = "2025-06-01T16:00"#"2024-03-22T08:30"
departure_datetime  = "2025-06-01T19:00"
lat                 = 48.895838
lon                 = -64.148466
power_cost          = 36.81
max_charge_power    = 5
# ============================

