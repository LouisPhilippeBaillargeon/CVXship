name = "sept-ile-grande-entree"
description = "Sept-Ile to Grande-Entree speed-restricted route case."

[run]
dimensions = "both"
new_ship = true
new_weather = true
solver_verbose = false
unit_commitment = false
ordered_sets = false

[cache]
scope = "case"

[fit_range]
lower_speed_factor = 0.85
upper_speed_factor = 1.1
lower_res_factor = 0.7
upper_res_factor = 1.2
lower_prop_factor = 0.7
upper_prop_factor = 1.2

[outputs]
save_plots = true
show_plots = false
save_solutions = true
save_console_log = true

[[scenario]]
name = "jun01"
departure_date = "2024-06-01"
weather_variant = "jun01"
